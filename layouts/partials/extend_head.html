<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

<style>
@media print {
    /* 1. FLEX- & HÖHEN-KILLER: Zwingt die Seite, sich dem Inhalt anzupassen, nicht dem Bildschirm! */
    html, body {
        display: block !important;
        height: auto !important;
        min-height: 0 !important;
    }

    /* 2. BODY ZURÜCKSETZEN */
    body {
        font-family: 'Nunito', sans-serif !important;
        font-size: 11pt !important;
        line-height: 1.4 !important;
        background: #fff !important;
        color: #000 !important;
    }

    /* 3. ALLE WRAPPER IN BLOCK-FORMAT ZWINGEN */
    .main, .post-single, .post-content, article {
        display: block !important;
        margin: 0 !important;
        padding: 0 !important;
        width: 100% !important;
        max-width: 100% !important;
        box-shadow: none !important;
    }

    /* 4. Letzter Absatz: Kein unsichtbarer Platzhalter nach unten! */
    .post-content > *:last-child {
        margin-bottom: 0 !important;
    }

    /* 5. VERSTECKEN: Alles was keine Tinte verdient */
    .header, .footer, .post-footer, .share-buttons, .toc, 
    #cookie-banner, .top-link, .theme-toggle, .breadcrumbs, .pagination {
        display: none !important;
    }

    /* 6. BILDER-KONTROLLE */
    img {
        max-width: 100% !important;
        max-height: 400px !important; 
        object-fit: contain !important;
    }

    /* 7. ÜBERSCHRIFTEN */
    h1, h2, h3 {
        font-family: 'Fredoka', cursive !important;
        margin-top: 20px !important;
    }

    /* 8. LINKS: Schwarz */
    a {
        color: #000 !important;
        text-decoration: none !important;
    }
}
</style>
