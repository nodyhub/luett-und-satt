<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Lütt & Satt - OG Image Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Das eigentliche OG-Bild (1200×630) */
        .og-container {
            width: 1200px;
            height: 630px;
            box-sizing: border-box;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            overflow: hidden;

            /* Zirkuszelt-Streifen — identisch mit .header in custom.css */
            background: repeating-linear-gradient(
                -55deg,
                #e63946   0px,
                #e63946   14px,
                #ffffff   14px,
                #ffffff   28px
            );

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 32px;
            padding: 60px;
            text-align: center;
        }

        /* Logo-Badge — identisch mit .header .logo a in custom.css */
        .logo-badge {
            font-family: 'Fredoka', cursive;
            font-size: 90px;
            font-weight: 700;
            color: #1a1a1a;
            background: #ffffff;
            border: 6px solid #c1121f;
            border-radius: 999px;
            padding: 6px 48px;
            line-height: 1.2;
            display: inline-block;
        }

        /* Weißes Infofeld für Anker + Untertitel */
        .info-card {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 20px;
            padding: 28px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            max-width: 900px;
        }

        .anker {
            font-size: 64px;
            line-height: 1;
        }

        .subtitle {
            font-family: 'Nunito', sans-serif;
            font-size: 36px;
            font-weight: 600;
            color: #555;
            line-height: 1.4;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="og-container">
        <div class="logo-badge">Lütt &amp; Satt</div>
        <div class="info-card">
            <p class="subtitle">Schietbüdel-Kombüse: Schnelle Rezepte für die Lütten.</p>
        </div>
    </div>

</body>
</html>
